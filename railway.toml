[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node -e \"process.on('uncaughtException',e=>{console.error('FATAL:',e.stack);process.exit(1)});require('./server.js')\""
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
